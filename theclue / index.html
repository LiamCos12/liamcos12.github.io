<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grid Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #222;
    }

    .container {
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #555;
    }

    a.button {
      display: inline-block;
      background: #007AFF;
      color: white; 
      padding: 15px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    a.button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Grid Games</h1>
    <p>Download The Clue on the App Store.</p>

    <a class="button" href="https://apps.apple.com/au/app/the-grid-daily-sudoku/id6760514775">
      Download on the App Store
    </a>
  </div>
</body>
</html>
